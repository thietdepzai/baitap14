<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading List - React useContext</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f9f9f9; }
        .header-title { text-align: center; font-size: 40px; color: #4a4a4a; margin: 40px 0; font-weight: bold; }
        .book-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 900px; margin: 0 auto; padding: 20px; }
        .book-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; width: calc(33.333% - 20px); overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .book-card img { width: 100%; height: 180px; object-fit: cover; }
        .book-title { padding: 15px; font-size: 18px; color: #555; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.2); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .delete-btn:hover { background: rgba(255,0,0,0.7); }
        .add-book-section { background-color: #1abc9c; padding: 30px; margin-top: 50px; }
        .add-form { max-width: 900px; margin: 0 auto; }
        .add-form h2, .add-form label { color: white; }
        .add-form input { width: 100%; padding: 10px; border: none; border-radius: 4px; margin: 10px 0 15px; box-sizing: border-box; }
        .add-form button { background: white; color: #555; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // 2. KHỞI TẠO CONTEXT
        const BookContext = createContext();

        const API_URL = 'http://localhost:3000/books';

        // 3. BOOK PROVIDER - Nơi quản lý State và gọi API
        function BookProvider({ children }) {
            const [books, setBooks] = useState([]);

            // Lấy danh sách (READ)
            const fetchBooks = async () => {
                const response = await fetch(API_URL);
                const data = await response.json();
                setBooks(data);
            };

            useEffect(() => { fetchBooks(); }, []);

            // Thêm sách (CREATE)
            const addBook = async (title) => {
                const randomImage = `https://picsum.photos/400/300?random=${Math.random()}`;
                const newBook = { title, image: randomImage };
                
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newBook)
                });
                fetchBooks();
            };

            // Xóa sách (DELETE)
            const deleteBook = async (id) => {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchBooks();
            };

            // Giá trị truyền xuống các component con
            const value = { books, addBook, deleteBook };

            return (
                <BookContext.Provider value={value}>
                    {children}
                </BookContext.Provider>
            );
        }

        // 4. COMPONENT CON: BOOK CARD
        function BookCard({ book }) {
            const { deleteBook } = useContext(BookContext);
            return (
                <div className="book-card">
                    <button className="delete-btn" onClick={() => deleteBook(book.id)}>×</button>
                    <img src={book.image} alt={book.title} />
                    <div className="book-title">{book.title}</div>
                </div>
            );
        }

        // 5. COMPONENT CON: BOOK LIST
        function BookList() {
            const { books } = useContext(BookContext);
            return (
                <div className="book-container">
                    {books.map(book => <BookCard key={book.id} book={book} />)}
                </div>
            );
        }

        // 6. COMPONENT CON: ADD BOOK FORM
        function AddBook() {
            const [title, setTitle] = useState('');
            const { addBook } = useContext(BookContext);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (title.trim()) {
                    addBook(title);
                    setTitle('');
                }
            };

            return (
                <div className="add-book-section">
                    <form className="add-form" onSubmit={handleSubmit}>
                        <h2>Add a Book</h2>
                        <label>Title</label>
                        <input 
                            type="text" 
                            value={title} 
                            onChange={(e) => setTitle(e.target.value)} 
                            required 
                        />
                        <button type="submit">Create!</button>
                    </form>
                </div>
            );
        }

        // 7. COMPONENT CHÍNH
        function App() {
            return (
                <BookProvider>
                    <h1 className="header-title">Reading List</h1>
                    <BookList />
                    <AddBook />
                </BookProvider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
